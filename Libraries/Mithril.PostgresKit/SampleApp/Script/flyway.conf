# [DB 연결 정보]
# 포스트그레스용 JDBC URL 형식입니다.
flyway.url=jdbc:postgresql://localhost:5432/gameDb
flyway.user=postgres
flyway.password=0308

# [스키마 설정]
# C# 코드에서 "game" 스키마를 사용하므로 명시해줍니다.
flyway.schemas=game
# 만약 DB에 game 스키마가 없으면 자동으로 만들어줍니다.
flyway.createSchemas=true

# [파일 위치]
# SQL 마이그레이션 파일이 들어갈 폴더 경로입니다. (상대 경로)
flyway.locations=filesystem:./migrations

# [기타]
# 마이그레이션 기록 테이블의 이름을 지정할 수 있습니다 (기본값: flyway_schema_history)
# flyway.table=schema_history

flyway.baselineOnMigrate=true